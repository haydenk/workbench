version: 2
updates:
  # Keep devcontainer features (common-utils, github-cli, git-lfs,
  # docker-outside-of-docker, tailscale) up to date.
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "devcontainer"
    labels:
      - "dependencies"
      - "devcontainer"

  # Keep GitHub Actions pins (actions/checkout, devcontainers/ci, etc.)
  # current. Auto-merge workflow handles patch/minor for both ecosystems.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "actions"
    labels:
      - "dependencies"
      - "github-actions"
