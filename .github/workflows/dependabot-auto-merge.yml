name: Dependabot auto-merge

# Auto-approve and enable auto-merge on Dependabot PRs for patch + minor
# updates. Major bumps stay manual — feature majors occasionally change config
# schema and deserve a human look.
#
# Uses the default GITHUB_TOKEN. No extra secrets required.
#
# Prerequisites (one-time, GitHub UI):
#   • Settings → General → Pull Requests → "Allow auto-merge" must be enabled;
#     otherwise `gh pr merge --auto` errors instead of queueing the merge.
#   • Settings → Actions → General → Workflow permissions → "Allow GitHub
#     Actions to create and approve pull requests" must also be enabled;
#     otherwise the approve step silently no-ops.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to auto-merge
        id: gate
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        run: |
          if [ "$UPDATE_TYPE" = "version-update:semver-patch" ] || [ "$UPDATE_TYPE" = "version-update:semver-minor" ]; then
            echo "should-merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.gate.outputs.should-merge == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.gate.outputs.should-merge == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
