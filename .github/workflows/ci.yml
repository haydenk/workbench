name: CI

# Lint and smoke-test the devcontainer scripts and the container itself.
# Independent jobs so a fish parser error doesn't mask a shellcheck
# regression and vice versa.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on PR branches; let master and manual runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shellcheck:
    name: shellcheck (bash + POSIX sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run shellcheck
        run: |
          shellcheck .devcontainer/scripts/post-create.sh
          shellcheck .devcontainer/scripts/post-start.sh
          shellcheck -s sh .devcontainer/scripts/ghrepo-core

  zsh-syntax:
    # shellcheck doesn't grok zsh-only syntax (${(P)var}, ${var:u}),
    # so the zsh wrapper gets `zsh -n` instead.
    name: zsh -n ghrepo.zsh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - name: Syntax check
        run: zsh -n .devcontainer/scripts/ghrepo.zsh

  fish-syntax:
    name: fish -n ghrepo.fish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install fish
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fish
      - name: Syntax check
        run: fish -n .devcontainer/scripts/ghrepo.fish

  actionlint:
    name: actionlint (lint workflow YAML + embedded run blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint workflow files
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  devcontainer-smoke:
    name: devcontainer build + ghrepo loads via real bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build container and exercise the real bootstrap chain
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          runCmd: |
            set -e
            echo "── ghrepo-core on PATH ──"
            command -v ghrepo-core

            echo "── ~/.zshenv sets ZDOTDIR (Issue #2 bootstrap) ──"
            test -f "$HOME/.zshenv" || { echo "FAIL: ~/.zshenv missing" >&2; exit 1; }
            grep -q ZDOTDIR "$HOME/.zshenv" || { echo "FAIL: ~/.zshenv has no ZDOTDIR" >&2; exit 1; }

            echo "── ghrepo defined in a fresh interactive zsh (full bootstrap) ──"
            # `-i` makes zsh read .zshenv → $ZDOTDIR/.zshrc, which is what a real
            # Codespaces terminal does. A wrapper that loads only when explicitly
            # sourced (the previous test) would have hidden any ZDOTDIR regression.
            zsh -ic 'type ghrepo > /dev/null' || { echo "FAIL: ghrepo not defined in interactive zsh" >&2; exit 1; }

            echo "── ghrepo defined in fish (conf.d/ auto-sourced) ──"
            fish -c 'functions -q ghrepo' || { echo "FAIL: ghrepo not defined in fish" >&2; exit 1; }
